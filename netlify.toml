[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NPM_FLAGS = "--include=dev"

[[redirects]]
  from = "/api/app/config"
  to = "/.netlify/functions/app-config"
  status = 200

[[redirects]]
  from = "/api/auth/token"
  to = "/.netlify/functions/auth-token"
  status = 200

# Static docs catalog mounted at /docs — serve real files, never the SPA fallback.
# Redirect bare /docs -> /docs/ so relative asset paths resolve under /docs/.
[[redirects]]
  from = "/docs"
  to = "/docs/"
  status = 301

[[redirects]]
  from = "/docs/*"
  to = "/docs/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
